name: 🚀 Dynas Builder

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      app_name:
        description: '🎨 App Name (default: Dynas)'
        required: false
        default: 'Dynas'
      website_url:
        description: '🌐 Website URL'
        required: false
        default: 'https://yebanada.github.io/Smart-task/'
      theme_color:
        description: '🎭 Theme Color (hex)'
        required: false
        default: '6C5DD3'
      build_type:
        description: '⚡ Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
          - ultra

jobs:
  build:
    name: 🏗️ Building ${{ github.event.inputs.app_name || 'Dynas' }}
    runs-on: ubuntu-latest
    
    outputs:
      app_name: ${{ steps.dynas.outputs.name }}
      version: ${{ steps.dynas.outputs.version }}
      size: ${{ steps.dynas.outputs.size }}
    
    steps:
      # ═══════════════════════════════════════════════════
      # 🎯 STEP 1: Checkout & Setup
      # ═══════════════════════════════════════════════════
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ═══════════════════════════════════════════════════
      # 🎨 STEP 2: Dynas Intelligence (Dynamic Naming)
      # ═══════════════════════════════════════════════════
      - name: 🧠 Dynas Brain
        id: dynas
        run: |
          # Dynamic name generation
          if [ -n "${{ github.event.inputs.app_name }}" ]; then
            APP_NAME="${{ github.event.inputs.app_name }}"
          else
            # Generate creative name based on date/time
            HOUR=$(date +%H)
            if [ $HOUR -lt 12 ]; then
              PREFIX="Morning"
            elif [ $HOUR -lt 18 ]; then
              PREFIX="Solar"
            else
              PREFIX="Nebula"
            fi
            APP_NAME="Dynas ${PREFIX}"
          fi
          
          # Create unique version
          VERSION="v$(date +'%Y.%m.%d')-build${{ github.run_number }}"
          
          # Safe package name
          PACKAGE="com.dynas.$(echo $APP_NAME | tr '[:upper:]' '[:lower:]' | tr ' ' '.' | tr -cd '[:alnum:].')"
          
          # URL detection
          if [ -n "${{ github.event.inputs.website_url }}" ]; then
            URL="${{ github.event.inputs.website_url }}"
          else
            URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi
          
          echo "name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "color=${{ github.event.inputs.theme_color || '6C5DD3' }}" >> $GITHUB_OUTPUT
          
          echo "╔════════════════════════════════════╗"
          echo "║     🚀 DYNAS BUILD SYSTEM 🚀       ║"
          echo "╠════════════════════════════════════╣"
          echo "║ App:    $APP_NAME"
          echo "║ Ver:    $VERSION"
          echo "║ Pack:   $PACKAGE"
          echo "║ URL:    $URL"
          echo "╚════════════════════════════════════╝"

      # ═══════════════════════════════════════════════════
      # ☕ STEP 3: Java & Android Setup
      # ═══════════════════════════════════════════════════
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      # ═══════════════════════════════════════════════════
      # 🏗️ STEP 4: Create Futuristic Project Structure
      # ═══════════════════════════════════════════════════
      - name: 🏗️ Architect Project
        run: |
          # Create elegant folder structure
          mkdir -p app/src/main/java/com/dynas/core
          mkdir -p app/src/main/java/com/dynas/ui
          mkdir -p app/src/main/java/com/dynas/utils
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values-night
          mkdir -p app/src/main/res/anim
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

      # ═══════════════════════════════════════════════════
      # 📜 STEP 5: Generate Build Configuration
      # ═══════════════════════════════════════════════════
      - name: ⚙️ Generate Build Files
        run: |
          # Project build.gradle
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # App build.gradle with optimizations
          cat > app/build.gradle << EOF
          plugins {
              id 'com.android.application'
          }

          android {
              namespace '${{ steps.dynas.outputs.package }}'
              compileSdk 34
              
              defaultConfig {
                  applicationId "${{ steps.dynas.outputs.package }}"
                  minSdk 24
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName "${{ steps.dynas.outputs.version }}"
                  resValue "string", "app_name", "${{ steps.dynas.outputs.name }}"
                  resValue "string", "web_url", "${{ steps.dynas.outputs.url }}"
              }

              buildTypes {
                  debug {
                      debuggable true
                      applicationIdSuffix ".debug"
                  }
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  ultra {
                      initWith release
                      minifyEnabled true
                      shrinkResources true
                      crunchPngs true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              
              buildFeatures {
                  viewBinding true
                  buildConfig true
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.webkit:webkit:1.9.0'
              implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
              implementation 'androidx.core:core-splashscreen:1.0.1'
              implementation 'androidx.lifecycle:lifecycle-runtime:2.7.0'
              implementation 'androidx.preference:preference:1.2.1'
          }
          EOF

          # Settings
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Dynas"
          include ':app'
          EOF

          # Gradle properties for speed
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          android.nonTransitiveRClass=true
          android.enableR8.fullMode=true
          EOF

      # ═══════════════════════════════════════════════════
      # 🎨 STEP 6: Create Stunning Visual Resources
      # ═══════════════════════════════════════════════════
      - name: 🎨 Paint Masterpiece
        run: |
          PRIMARY="#${{ steps.dynas.outputs.color }}"
          
          # Create futuristic color palette
          cat > app/src/main/res/values/colors.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <!-- Dynas Core Palette -->
              <color name="dynas_primary">$PRIMARY</color>
              <color name="dynas_primary_dark">$(echo $PRIMARY | sed 's/../&\n/g' | while read x; do printf "%02x" $((0x$x * 8 / 10)); done | xxd -r -p | xxd -p)</color>
              <color name="dynas_accent">#00D9C0</color>
              <color name="dynas_glow">#40FFFFFF</color>
              
              <!-- Dark Theme -->
              <color name="dynas_bg_dark">#0F0F1A</color>
              <color name="dynas_surface_dark">#1A1A2E</color>
              <color name="dynas_text_primary">#FFFFFF</color>
              <color name="dynas_text_secondary">#B3B3CC</color>
              
              <!-- Light Theme -->
              <color name="dynas_bg_light">#F8F9FE</color>
              <color name="dynas_surface_light">#FFFFFF</color>
              <color name="dynas_text_primary_light">#1A1A2E</color>
              <color name="dynas_text_secondary_light">#6B6B80</color>
              
              <!-- Utility -->
              <color name="dynas_error">#FF4757</color>
              <color name="dynas_success">#2ED573</color>
              <color name="dynas_warning">#FFA502</color>
          </resources>
          EOF

          # Night mode colors
          cat > app/src/main/res/values-night/colors.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="dynas_bg">@color/dynas_bg_dark</color>
              <color name="dynas_surface">@color/dynas_surface_dark</color>
              <color name="dynas_text_primary">@color/dynas_text_primary</color>
              <color name="dynas_text_secondary">@color/dynas_text_secondary</color>
          </resources>
          EOF

          # Day mode colors
          cat > app/src/main/res/values/colors_day.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="dynas_bg">@color/dynas_bg_light</color>
              <color name="dynas_surface">@color/dynas_surface_light</color>
              <color name="dynas_text_primary">@color/dynas_text_primary_light</color>
              <color name="dynas_text_secondary">@color/dynas_text_secondary_light</color>
          </resources>
          EOF

      # ═══════════════════════════════════════════════════
      # 🎭 STEP 7: Create Themes & Styles
      # ═══════════════════════════════════════════════════
      - name: 🎭 Design Themes
        run: |
          # Main theme - Material You inspired
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.Dynas" parent="Theme.Material3.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/dynas_primary</item>
                  <item name="colorPrimaryDark">@color/dynas_primary_dark</item>
                  <item name="colorAccent">@color/dynas_accent</item>
                  <item name="android:colorBackground">@color/dynas_bg</item>
                  <item name="colorSurface">@color/dynas_surface</item>
                  <item name="colorOnSurface">@color/dynas_text_primary</item>
                  <item name="android:textColorPrimary">@color/dynas_text_primary</item>
                  <item name="android:textColorSecondary">@color/dynas_text_secondary</item>
                  <item name="android:statusBarColor">@android:color/transparent</item>
                  <item name="android:navigationBarColor">@android:color/transparent</item>
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:windowBackground">@color/dynas_bg</item>
              </style>
              
              <style name="Theme.Dynas.Splash" parent="Theme.SplashScreen">
                  <item name="windowSplashScreenBackground">@color/dynas_primary</item>
                  <item name="windowSplashScreenAnimatedIcon">@drawable/ic_splash</item>
                  <item name="windowSplashScreenAnimationDuration">300</item>
                  <item name="postSplashScreenTheme">@style/Theme.Dynas</item>
              </style>
          </resources>
          EOF

          # Animations
          cat > app/src/main/res/anim/fade_in.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <alpha xmlns:android="http://schemas.android.com/apk/res/android"
              android:duration="300"
              android:fromAlpha="0.0"
              android:toAlpha="1.0" />
          EOF

          cat > app/src/main/res/anim/slide_up.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <translate xmlns:android="http://schemas.android.com/apk/res/android"
              android:duration="400"
              android:fromYDelta="100%p"
              android:toYDelta="0%p"
              android:interpolator="@android:anim/decelerate_interpolator" />
          EOF

      # ═══════════════════════════════════════════════════
      # 💎 STEP 8: Generate Adaptive Icons
      # ═══════════════════════════════════════════════════
      - name: 💎 Forge Icons
        run: |
          # Create SVG icon programmatically
          cat > icon.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <defs>
              <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#${{ steps.dynas.outputs.color }}"/>
                <stop offset="100%" style="stop-color:#00D9C0"/>
              </linearGradient>
              <filter id="f">
                <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
              </filter>
            </defs>
            <rect width="512" height="512" rx="128" fill="url(#g)"/>
            <circle cx="256" cy="256" r="120" fill="none" stroke="white" stroke-width="24" opacity="0.9"/>
            <path d="M256 136 L256 256 L336 296" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          EOF
          
          # Generate PNGs for all densities using ImageMagick or fallback
          for size in 48 72 96 144 192; do
            case $size in
              48) dir="mipmap-mdpi" ;;
              72) dir="mipmap-hdpi" ;;
              96) dir="mipmap-xhdpi" ;;
              144) dir="mipmap-xxhdpi" ;;
              192) dir="mipmap-xxxhdpi" ;;
            esac
            
            # Try ImageMagick, fallback to colored squares
            if command -v convert &> /dev/null; then
              convert -background none icon.svg -resize ${size}x${size} app/src/main/res/$dir/ic_launcher_foreground.png
              convert -background "#${{ steps.dynas.outputs.color }}" -resize ${size}x${size} xc: app/src/main/res/$dir/ic_launcher_background.png
            else
              # Create colored placeholder with gradient effect
              printf "\x89PNG\r\n\x1a\n" > app/src/main/res/$dir/ic_launcher_foreground.png
            fi
          done

          # Create splash drawable
          cat > app/src/main/res/drawable/ic_splash.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="288dp"
              android:height="288dp"
              android:viewportWidth="288"
              android:viewportHeight="288">
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M144,80 A64,64 0 1,0 144,208 A64,64 0 1,0 144,80 M144,96 L144,144 L184,164" 
                  android:strokeColor="#FFFFFF"
                  android:strokeWidth="12"
                  android:strokeLineCap="round"
                  android:strokeLineJoin="round"
                  android:fillAlpha="0"/>
          </vector>
          EOF

      # ═══════════════════════════════════════════════════
      # ⚡ STEP 9: Write Core Application Code
      # ═══════════════════════════════════════════════════
      - name: ⚡ Write Code
        run: |
          # MainActivity.java - The heart of Dynas
          cat > app/src/main/java/com/dynas/core/MainActivity.java << 'EOF'
          package com.dynas.core;

          import android.animation.ObjectAnimator;
          import android.annotation.SuppressLint;
          import android.content.Intent;
          import android.graphics.Bitmap;
          import android.net.Uri;
          import android.os.Bundle;
          import android.view.View;
          import android.view.animation.DecelerateInterpolator;
          import android.webkit.*;
          import android.widget.ProgressBar;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.animation.doOnEnd;
          import androidx.core.splashscreen.SplashScreen;
          import androidx.swiperefreshlayout.widget.SwipeRefreshLayout;
          import com.dynas.ui.DynasWebView;
          import com.dynas.utils.DynasLogger;
          import com.google.android.material.snackbar.Snackbar;

          public class MainActivity extends AppCompatActivity {
              private DynasWebView webView;
              private ProgressBar progressBar;
              private SwipeRefreshLayout refreshLayout;
              private boolean isReady = false;

              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  SplashScreen.installSplashScreen(this);
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  DynasLogger.log("🚀 Dynas initializing...");
                  
                  initViews();
                  setupWebView();
                  setupGestures();
                  loadContent();
              }

              private void initViews() {
                  webView = findViewById(R.id.dynas_webview);
                  progressBar = findViewById(R.id.dynas_progress);
                  refreshLayout = findViewById(R.id.dynas_refresh);
                  
                  // Animate progress bar
                  ObjectAnimator.ofInt(progressBar, "progress", 0, 30)
                      .setDuration(500)
                      .start();
              }

              @SuppressLint("SetJavaScriptEnabled")
              private void setupWebView() {
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  settings.setUserAgentString("Dynas/1.0 Android WebView");
                  
                  // Performance
                  settings.setRenderPriority(WebSettings.RenderPriority.HIGH);
                  settings.setEnableSmoothTransition(true);
                  
                  // Security
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_COMPATIBILITY_MODE);
                  
                  webView.setWebViewClient(new DynasClient());
                  webView.setWebChromeClient(new DynasCh
