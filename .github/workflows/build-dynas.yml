name: Dynas Builder

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
        required: false
        default: 'Dynas'
      website_url:
        description: 'Website URL'
        required: false
        default: 'https://yebanada.github.io/Smart-task/'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up config
        id: config
        run: |
          echo "name=${{ github.event.inputs.app_name || 'Dynas' }}" >> $GITHUB_OUTPUT
          echo "url=${{ github.event.inputs.website_url || 'https://yebanada.github.io/Smart-task/' }}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android project
        run: |
          # Create all necessary directories
          mkdir -p app/src/main/java/com/dynas/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

            - name: Create gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          
          # Create properties file
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Download the actual wrapper jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          
          # This script tells Java to run the Gradle Wrapper JAR
          cat > gradlew << 'EOF'
          #!/bin/sh
          exec java -Xmx64m -cp "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          
          chmod +x gradlew

        
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

          # Settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "DynasApp"
          include ':app'
          EOF

      - name: Create source code
        run: |
          # MainActivity.java
          cat > app/src/main/java/com/dynas/app/MainActivity.java << 'EOF'
          package com.dynas.app;
          
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl(getString(R.string.web_url));
                  
                  setContentView(webView);
              }
              
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

          # Strings.xml
          cat > app/src/main/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${{ steps.config.outputs.name }}</string>
              <string name="web_url">${{ steps.config.outputs.url }}</string>
          </resources>
          EOF

          # Colors.xml
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="purple_500">#FF6200EE</color>
              <color name="purple_700">#FF3700B3</color>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF

          # Themes.xml
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.Dynas" parent="Theme.MaterialComponents.DayNight.DarkActionBar">
                  <item name="colorPrimary">@color/purple_500</item>
                  <item name="colorPrimaryVariant">@color/purple_700</item>
                  <item name="colorOnPrimary">@color/white</item>
              </style>
          </resources>
          EOF

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.dynas.app">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@android:drawable/ic_menu_compass"
                  android:label="@string/app_name"
                  android:roundIcon="@android:drawable/ic_menu_compass"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.Dynas"
                  android:usesCleartextTraffic="false">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK with Gradle
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Find and rename APK
        run: |
          mkdir -p output
          find app/build/outputs/apk -name "*.apk" -exec cp {} output/${{ steps.config.outputs.name }}.apk \;
          ls -la output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.config.outputs.name }}-APK
          path: output/*.apk
          
