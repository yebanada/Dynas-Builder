name: 🚀 Dynas Builder

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      app_name:
        description: '🎨 App Name'
        required: false
        default: 'Dynas'
      website_url:
        description: '🌐 Website URL'
        required: false
        default: 'https://yebanada.github.io/Smart-task/'

jobs:
  build:
    name: 🏗️ Building ${{ github.event.inputs.app_name || 'Dynas' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧠 Dynas Config
        id: config
        run: |
          echo "name=${{ github.event.inputs.app_name || 'Dynas' }}" >> $GITHUB_OUTPUT
          echo "url=${{ github.event.inputs.website_url || 'https://yebanada.github.io/Smart-task/' }}" >> $GITHUB_OUTPUT
          echo "version=$(date +'%Y.%m.%d').${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android
        uses: android-actions/setup-android@v3

      - name: 🏗️ Create Project
        run: |
          mkdir -p app/src/main/java/com/dynas
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

      - name: 📝 Create Build Files
        run: |
          # Project build.gradle
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.0' apply false
          }
          EOF

          # App build.gradle
          cat > app/build.gradle << EOF
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.dynas.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dynas.app"
                  minSdk 24
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName "${{ steps.config.outputs.version }}"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          # Settings
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Dynas"
          include ':app'
          EOF

          # Gradle properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF

      - name: 💻 Create Source Code
        run: |
          # MainActivity.java
          cat > app/src/main/java/com/dynas/MainActivity.java << 'EOF'
          package com.dynas;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl(getString(R.string.web_url));
                  setContentView(webView);
              }
          }
          EOF

          # Strings
          cat > app/src/main/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${{ steps.config.outputs.name }}</string>
              <string name="web_url">${{ steps.config.outputs.url }}</string>
          </resources>
          EOF

          # Colors
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="purple_500">#FF6200EE</color>
              <color name="purple_700">#FF3700B3</color>
          </resources>
          EOF

          # Theme
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.Dynas" parent="Theme.Material3.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/purple_500</item>
              </style>
          </resources>
          EOF

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="@string/app_name"
                  android:theme="@style/Theme.Dynas">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 🔨 Build APK
        uses: android-actions/build-android-app@v1
        with:
          project-path: .
          output-path: app-release.apk
          gradle-task: assembleRelease

      - name: 📦 Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.config.outputs.name }}-APK
          path: app-release.apk
          
